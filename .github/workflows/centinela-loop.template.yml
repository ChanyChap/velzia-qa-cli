# Plantilla del workflow que corre Centinela 24/7 en cada proyecto.
# Copiar a <proyecto>/.github/workflows/centinela-loop.yml.
#
# Pre-requisitos en el repo del proyecto:
# - Secrets: ANTHROPIC_API_KEY, BROWSERBASE_API_KEY, BROWSERBASE_PROJECT_ID,
#   QA_USER_EMAIL, QA_USER_PASSWORD, QA_USER_TENANT_ID, QA_USER_PROJECT_ID,
#   QA_CLIENT_EMAIL, QA_CLIENT_PHONE, QA_VELZIA_API_TOKEN.
# - Carpeta .claude/ con qa-nocturno.config.json + (opcional) full-app-matrix.md
#   y peticiones-registry.md.

name: Centinela Loop (24/7)

on:
  schedule:
    # Cada 30 min. GitHub puede retrasar 5-15 min por carga; ritmo real ≈ 30-45 min.
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      max_features:
        description: "Máximo de features a probar este tick"
        required: false
        default: "15"

# Permite que un nuevo tick se solape con el anterior si el viejo se quedó colgado.
concurrency:
  group: centinela-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  centinela:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: read
      packages: read
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # Browserbase opcional: solo se usa si engine.type = "browserbase".
      # Por defecto cada qa-nocturno.config.json usa "stagehand-local" (Playwright en el runner, gratis).
      BROWSERBASE_API_KEY: ${{ secrets.BROWSERBASE_API_KEY }}
      BROWSERBASE_PROJECT_ID: ${{ secrets.BROWSERBASE_PROJECT_ID }}
      QA_USER_EMAIL: ${{ secrets.QA_USER_EMAIL }}
      QA_USER_PASSWORD: ${{ secrets.QA_USER_PASSWORD }}
      QA_USER_TENANT_ID: ${{ secrets.QA_USER_TENANT_ID }}
      QA_USER_PROJECT_ID: ${{ secrets.QA_USER_PROJECT_ID }}
      QA_CLIENT_EMAIL: ${{ secrets.QA_CLIENT_EMAIL }}
      QA_CLIENT_PHONE: ${{ secrets.QA_CLIENT_PHONE }}
      QA_VELZIA_API_URL: https://qa-velzia.chany-velzia.workers.dev
      QA_VELZIA_API_TOKEN: ${{ secrets.QA_VELZIA_API_TOKEN }}
      RUN_ID: centinela-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@chanychap"

      - name: Install qa-cli (GitHub Packages)
        run: npm install -g @chanychap/qa-cli@latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Playwright local — Stagehand corre en el runner, sin Browserbase.
      # Solo Chromium (suficiente para QA web), --with-deps para libs del SO.
      - name: Install Playwright (Chromium)
        run: npx --yes playwright@latest install chromium --with-deps

      # 1. Espejar matrix + registry locales a la tabla `specs` de D1.
      # Garantiza que cualquier petición nueva añadida a peticiones-registry.md
      # se sube a la BD antes de probar (anti-pérdida ante borrado de ramas).
      - name: Sync specs (matrix + registry) to D1
        run: qa-cli sync-specs --cwd .
        continue-on-error: true

      # 2. Tick de Centinela: failing → pending → passing LRU.
      - name: Run Centinela (pending-priority)
        run: qa-cli centinela --mode pending-priority --max-features ${{ github.event.inputs.max_features || '15' }} --cwd .
