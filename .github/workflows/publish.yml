name: Publish to GitHub Packages

# Se dispara al hacer push de un tag vX.Y.Z. Publica @chanychap/qa-cli en
# GitHub Packages (npm.pkg.github.com) usando el GITHUB_TOKEN automático
# del workflow — NO requiere ningún secret adicional.
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@chanychap"
      - run: npm ci
      - run: npm run build
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
